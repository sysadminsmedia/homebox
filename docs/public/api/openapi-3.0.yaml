openapi: 3.0.0
info:
  description: Track, Manage, and Organize your Things.
  title: Homebox API
  contact:
    name: Homebox Team
    url: https://discord.homebox.software
  version: "1.0"
paths:
  /v1/actions/create-missing-thumbnails:
    post:
      security:
        - Bearer: []
      description: Creates thumbnails for items that are missing them
      tags:
        - Actions
      summary: Create Missing Thumbnails
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.ActionAmountResult"
  /v1/actions/ensure-asset-ids:
    post:
      security:
        - Bearer: []
      description: Ensures all items in the database have an asset ID
      tags:
        - Actions
      summary: Ensure Asset IDs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.ActionAmountResult"
  /v1/actions/ensure-import-refs:
    post:
      security:
        - Bearer: []
      description: Ensures all items in the database have an import ref
      tags:
        - Actions
      summary: Ensures Import Refs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.ActionAmountResult"
  /v1/actions/set-primary-photos:
    post:
      security:
        - Bearer: []
      description: Sets the first photo of each item as the primary photo
      tags:
        - Actions
      summary: Set Primary Photos
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.ActionAmountResult"
  /v1/actions/wipe-inventory:
    post:
      security:
        - Bearer: []
      description: Deletes all items in the inventory
      tags:
        - Actions
      summary: Wipe Inventory
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/v1.WipeInventoryOptions"
        description: Wipe options
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.ActionAmountResult"
  /v1/actions/zero-item-time-fields:
    post:
      security:
        - Bearer: []
      description: Resets all item date fields to the beginning of the day
      tags:
        - Actions
      summary: Zero Out Time Fields
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.ActionAmountResult"
  "/v1/assets/{id}":
    get:
      security:
        - Bearer: []
      tags:
        - Items
      summary: Get Item by Asset ID
      parameters:
        - description: Asset ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.PaginationResult-repo_EntitySummary"
  /v1/currency:
    get:
      tags:
        - Base
      summary: Currency
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/currencies.Currency"
  /v1/entities:
    get:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Query All Entities
      parameters:
        - description: search string
          name: q
          in: query
          schema:
            type: string
        - description: page number
          name: page
          in: query
          schema:
            type: integer
        - description: items per page
          name: pageSize
          in: query
          schema:
            type: integer
        - description: tags Ids
          name: tags
          in: query
          explode: true
          schema:
            type: array
            items:
              type: string
        - description: parent Ids
          name: parentIds
          in: query
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.EntityListResult"
    post:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Create Entity
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.EntityCreate"
        description: Entity Data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.EntityOut"
  /v1/entities/export:
    get:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Export Entities
      responses:
        "200":
          description: text/csv
          content:
            "*/*":
              schema:
                type: string
  /v1/entities/fields:
    get:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Get All Custom Field Names
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /v1/entities/fields/values:
    get:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Get All Custom Field Values
      parameters:
        - description: Field name
          name: field
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /v1/entities/import:
    post:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Import Entities
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                csv:
                  description: CSV file to upload
                  type: string
                  format: binary
              required:
                - csv
        required: true
      responses:
        "204":
          description: No Content
  /v1/entities/tree:
    get:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Get Locations Tree
      parameters:
        - description: include items in response tree
          name: withItems
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.TreeItem"
  "/v1/entities/{id}":
    get:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Get Entity
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.EntityOut"
    put:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Update Entity
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.EntityUpdate"
        description: Entity Data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.EntityOut"
    delete:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Delete Entity
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
    patch:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Patch Entity
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.EntityPatch"
        description: Entity Data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.EntityOut"
  "/v1/entities/{id}/attachments":
    post:
      security:
        - Bearer: []
      tags:
        - Entities Attachments
      summary: Create Entity Attachment
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  description: File attachment
                  type: string
                  format: binary
                type:
                  description: Type of file
                  type: string
                primary:
                  description: Is this the primary attachment
                  type: boolean
                name:
                  description: name of the file including extension
                  type: string
              required:
                - file
                - name
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.EntityOut"
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validate.ErrorResponse"
  "/v1/entities/{id}/attachments/{attachment_id}":
    get:
      security:
        - Bearer: []
      tags:
        - Entities Attachments
      summary: Get Entity Attachment
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Attachment ID
          name: attachment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    put:
      security:
        - Bearer: []
      tags:
        - Entities Attachments
      summary: Update Entity Attachment
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Attachment ID
          name: attachment_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.ItemAttachmentUpdate"
        description: Attachment Update
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/repo.EntityOut"
    delete:
      security:
        - Bearer: []
      tags:
        - Entities Attachments
      summary: Delete Entity Attachment
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Attachment ID
          name: attachment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  "/v1/entities/{id}/duplicate":
    post:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Duplicate Entity
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.DuplicateOptions"
        description: Duplicate Options
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.EntityOut"
  "/v1/entities/{id}/maintenance":
    get:
      security:
        - Bearer: []
      tags:
        - Item Maintenance
      summary: Get Maintenance Log
      parameters:
        - description: Item ID
          name: id
          in: path
          required: true
          schema:
            type: string
        - x-enum-varnames:
            - MaintenanceFilterStatusScheduled
            - MaintenanceFilterStatusCompleted
            - MaintenanceFilterStatusBoth
          name: status
          in: query
          schema:
            type: string
            enum:
              - scheduled
              - completed
              - both
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.MaintenanceEntryWithDetails"
    post:
      security:
        - Bearer: []
      tags:
        - Item Maintenance
      summary: Create Maintenance Entry
      parameters:
        - description: Item ID
          name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.MaintenanceEntryCreate"
        description: Entry Data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.MaintenanceEntry"
  "/v1/entities/{id}/path":
    get:
      security:
        - Bearer: []
      tags:
        - Entities
      summary: Get the full path of an entity
      parameters:
        - description: Entity ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.EntityPath"
  /v1/entity-types:
    get:
      security:
        - Bearer: []
      tags:
        - Entity Types
      summary: Get All Entity Types
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.EntityTypeSummary"
    post:
      security:
        - Bearer: []
      tags:
        - Entity Types
      summary: Create Entity Type
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.EntityTypeCreate"
        description: Entity Type Data
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.EntityTypeSummary"
  "/v1/entity-types/{id}":
    put:
      security:
        - Bearer: []
      tags:
        - Entity Types
      summary: Update Entity Type
      parameters:
        - description: Entity Type ID
          name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.EntityTypeUpdate"
        description: Entity Type Data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.EntityTypeSummary"
    delete:
      security:
        - Bearer: []
      tags:
        - Entity Types
      summary: Delete Entity Type
      parameters:
        - description: Entity Type ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  /v1/groups:
    get:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Get Group
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.Group"
    put:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Update Group
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.GroupUpdate"
        description: User Data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.Group"
    post:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Create Group
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/v1.CreateRequest"
        description: Create group request
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.Group"
    delete:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Delete Group
      responses:
        "204":
          description: No Content
  /v1/groups/all:
    get:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Get All Groups
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.Group"
  /v1/groups/invitations:
    get:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Get All Group Invitations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.GroupInvitation"
    post:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Create Group Invitation
      operationId: groupInvitationCreate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/v1.GroupInvitationCreate"
        description: User Data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.GroupInvitation"
  "/v1/groups/invitations/{id}":
    post:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Accept Group Invitation
      operationId: groupInvitationAccept
      parameters:
        - description: Invitation Token
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.GroupAcceptInvitationResponse"
    delete:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Delete Group Invitation
      parameters:
        - description: Invitation ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  /v1/groups/members:
    get:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Get All Group Members
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.UserSummary"
    post:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Add User to Group
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/v1.GroupMemberAdd"
        description: User ID
        required: true
      responses:
        "204":
          description: No Content
  "/v1/groups/members/{user_id}":
    delete:
      security:
        - Bearer: []
      tags:
        - Group
      summary: Remove User from Group
      parameters:
        - description: User ID
          name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  /v1/groups/statistics:
    get:
      security:
        - Bearer: []
      tags:
        - Statistics
      summary: Get Group Statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.GroupStatistics"
  /v1/groups/statistics/locations:
    get:
      security:
        - Bearer: []
      tags:
        - Statistics
      summary: Get Location Statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.TotalsByOrganizer"
  /v1/groups/statistics/purchase-price:
    get:
      security:
        - Bearer: []
      tags:
        - Statistics
      summary: Get Purchase Price Statistics
      parameters:
        - description: start date
          name: start
          in: query
          schema:
            type: string
        - description: end date
          name: end
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.ValueOverTime"
  /v1/groups/statistics/tags:
    get:
      security:
        - Bearer: []
      tags:
        - Statistics
      summary: Get Tags Statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.TotalsByOrganizer"
  "/v1/labelmaker/asset/{id}":
    get:
      security:
        - Bearer: []
      tags:
        - Items
      summary: Get Asset label
      parameters:
        - description: Asset ID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Print this label, defaults to false
          name: print
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: image/png
          content:
            application/json:
              schema:
                type: string
  "/v1/labelmaker/item/{id}":
    get:
      security:
        - Bearer: []
      tags:
        - Items
      summary: Get Item label
      parameters:
        - description: Item ID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Print this label, defaults to false
          name: print
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: image/png
          content:
            application/json:
              schema:
                type: string
  "/v1/labelmaker/location/{id}":
    get:
      security:
        - Bearer: []
      tags:
        - Locations
      summary: Get Location label
      parameters:
        - description: Location ID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Print this label, defaults to false
          name: print
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: image/png
          content:
            application/json:
              schema:
                type: string
  /v1/maintenance:
    get:
      security:
        - Bearer: []
      tags:
        - Maintenance
      summary: Query All Maintenance
      parameters:
        - x-enum-varnames:
            - MaintenanceFilterStatusScheduled
            - MaintenanceFilterStatusCompleted
            - MaintenanceFilterStatusBoth
          name: status
          in: query
          schema:
            type: string
            enum:
              - scheduled
              - completed
              - both
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.MaintenanceEntryWithDetails"
  "/v1/maintenance/{id}":
    put:
      security:
        - Bearer: []
      tags:
        - Maintenance
      summary: Update Maintenance Entry
      parameters:
        - description: Maintenance ID
          name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.MaintenanceEntryUpdate"
        description: Entry Data
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/repo.MaintenanceEntry"
    delete:
      security:
        - Bearer: []
      tags:
        - Maintenance
      summary: Delete Maintenance Entry
      parameters:
        - description: Maintenance ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  /v1/notifiers:
    get:
      security:
        - Bearer: []
      tags:
        - Notifiers
      summary: Get Notifiers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/repo.NotifierOut"
    post:
      security:
        - Bearer: []
      tags:
        - Notifiers
      summary: Create Notifier
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/repo.NotifierCreate"
        description: Notifier Data
        required: true
      responses:
